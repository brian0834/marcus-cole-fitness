<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcus Cole Fitness — Built Different. Train Different.</title>

  <!-- Fonts: Bebas Neue (hero/stats only) + DM Sans variable (everything else) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300..900;1,9..40,300..700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #0D0D0B;
      color: #E8E0D0;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    button, a { font-family: inherit; cursor: pointer; }
    img { display: block; max-width: 100%; }

    :root {
      --bg:           #0D0D0B;
      --surface:      #111110;
      --border:       rgba(255,255,255,0.07);
      --border-hi:    rgba(255,255,255,0.14);
      --text:         #E8E0D0;
      --muted:        #888880;
      --faint:        #3E3E3A;
      --accent:       #C8FF00;
      --acc-glow:     rgba(200,255,0,0.22);
      --acc-sub:      rgba(200,255,0,0.08);
      --ease:         cubic-bezier(0.16, 1, 0.3, 1);
      --ease-io:      cubic-bezier(0.76, 0, 0.24, 1);
      --radius-card:  20px;
      --radius-btn:   12px;
      --radius-sm:    8px;
    }

    /* ── Grain overlay ── required, 0.035 opacity */
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.035; pointer-events: none; z-index: 9999;
    }

    /* ── Nav link — pill nav style ── */
    .nav-link {
      position: relative; background: none; border: none;
      padding: 4px 0; font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 400; letter-spacing: 0;
      text-transform: none; color: rgba(255,255,255,0.55);
      transition: color 0.2s ease;
    }
    .nav-link::after {
      content: ''; position: absolute; bottom: -2px; left: 0;
      width: 0; height: 1px; background: #C8FF00;
      transition: width 0.25s ease;
    }
    .nav-link:hover { color: rgba(255,255,255,1); }
    .nav-link:hover::after { width: 100%; }

    /* ── Marquee ── */
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* ── Scrollbar ── */
    @keyframes scrollPulse {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50%       { transform: translateY(6px); opacity: 1; }
    }
    @keyframes introFadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes slideFromRight {
      from { opacity: 0; transform: translateX(32px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes slideFromLeft {
      from { opacity: 0; transform: translateX(-32px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes photoReveal {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes infoSlideUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: none; }
    }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #0D0D0B; }
    ::-webkit-scrollbar-thumb { background: #2A2A28; border-radius: 2px; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">


/* ════════════════════════════════════════════════════════════
   MARCUS COLE FITNESS
   Design language: Bebas Neue reserved for hero + CTA + stats.
   DM Sans 800 for all section headings — editorial, mixed case.
   Animations are earned, not sprayed.
   ════════════════════════════════════════════════════════════ */
const { useState, useEffect, useLayoutEffect, useRef, useCallback } = React;

/* ── Shared: scroll-triggered visibility ── */
const useInView = (threshold = 0.12, rootMargin = '0px 0px -12% 0px') => {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {setVis(true);obs.disconnect();}
    }, { threshold, rootMargin });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [threshold, rootMargin]);
  return [ref, vis];
};

/* ── Shared: animated counter — easeOutExpo curve ── */
const easeOutExpo = (t) => t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
const useCounter = (target, ms, active) => {
  const [v, setV] = useState(0);
  useEffect(() => {
    if (!active) return;
    let t0 = null;
    const tick = (ts) => {
      if (!t0) t0 = ts;
      const p = Math.min((ts - t0) / ms, 1);
      setV(Math.floor(easeOutExpo(p) * target));
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [active, target, ms]);
  return v;
};

/* ── Shared: mobile breakpoint ── */
const useMobile = () => {
  const [mobile, setMobile] = React.useState(() => window.innerWidth < 768);
  React.useEffect(() => {
    const fn = () => setMobile(window.innerWidth < 768);
    window.addEventListener('resize', fn, { passive: true });
    return () => window.removeEventListener('resize', fn);
  }, []);
  return mobile;
};

/* ── Shared: section reveal — Framer-style ease-out-quart ── */
const reveal = (vis, delay = 0, axis = 'y') => ({
  opacity: vis ? 1 : 0,
  transform: vis ? 'none'
    : axis === 'x'     ? 'translateX(-48px)'
    : axis === 'right' ? 'translateX(48px)'
    :                    'translateY(40px)',
  transition: `opacity 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) ${delay}ms, transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) ${delay}ms`,
  willChange: 'opacity, transform'
});

/* ── Shared: word-reveal animation — per-word stagger, no clip issues ── */
const Reveal = ({ children, delay = 0, accent = false, vis }) =>
<span style={{
  display: 'inline-block',
  color: accent ? '#C8FF00' : 'inherit',
  opacity: vis ? 1 : 0,
  transform: vis ? 'translateY(0)' : 'translateY(28px)',
  transition: `opacity .75s cubic-bezier(0.16,1,0.3,1) ${delay}ms, transform .75s cubic-bezier(0.16,1,0.3,1) ${delay}ms`
}}>{children}</span>;


/* ── Shared: accent button ── */
const accentHover = {
  onMouseEnter: (e) => {e.currentTarget.style.transform = 'scale(1.03)';e.currentTarget.style.boxShadow = '0 0 36px rgba(200,255,0,0.28)';},
  onMouseLeave: (e) => {e.currentTarget.style.transform = 'scale(1)';e.currentTarget.style.boxShadow = 'none';}
};

/* ── Section label ── */
const Label = ({ children, vis, style = {} }) =>
<div style={{ opacity: vis ? 1 : 0, transition: 'opacity 0.4s ease', fontFamily: 'DM Sans', fontSize: '11px', fontWeight: 500, letterSpacing: '0.2em', textTransform: 'uppercase', color: '#888880', marginBottom: '18px', ...style }}>{children}</div>;


/* ════════════════════════════════════════════════════════════
   1. NAV
   ════════════════════════════════════════════════════════════ */
const Nav = () => {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const isMobile = useMobile();
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  // Close menu on resize to desktop
  useEffect(() => { if (!isMobile) setMenuOpen(false); }, [isMobile]);
  const go = id => {
    setMenuOpen(false);
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
  };
  return (
    <>
      <nav style={{
        position: 'fixed', top: '16px', left: '50%', transform: 'translateX(-50%)',
        zIndex: 1000, display: 'flex', alignItems: 'center',
        width: isMobile ? 'calc(100vw - 40px)' : 'calc(100vw - 80px)',
        maxWidth: scrolled ? '1000px' : '1200px',
        padding: scrolled ? '9px 20px' : (isMobile ? '11px 20px' : '13px 36px'),
        borderRadius: scrolled ? '999px' : '20px',
        whiteSpace: 'nowrap',
        background: scrolled ? 'rgba(13,13,11,0.88)' : 'rgba(13,13,11,0.52)',
        backdropFilter: 'blur(24px) saturate(180%)',
        WebkitBackdropFilter: 'blur(24px) saturate(180%)',
        border: scrolled ? '1px solid rgba(255,255,255,0.15)' : '1px solid rgba(255,255,255,0.08)',
        boxShadow: scrolled ? '0 8px 32px rgba(0,0,0,0.45)' : '0 2px 24px rgba(0,0,0,0.15)',
        transition: 'max-width 0.5s cubic-bezier(0.16,1,0.3,1), padding 0.5s cubic-bezier(0.16,1,0.3,1), border-radius 0.5s cubic-bezier(0.16,1,0.3,1), background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease',
      }}>
        {/* Logo — pinned left */}
        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer', flexShrink: 0 }}
          onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
          <svg width="28" height="28" viewBox="0 0 256 256" fill="#C8FF00"><path d="M248,120h-8V88a16,16,0,0,0-16-16H208V64a16,16,0,0,0-16-16H168a16,16,0,0,0-16,16v56H104V64A16,16,0,0,0,88,48H64A16,16,0,0,0,48,64v8H32A16,16,0,0,0,16,88v32H8a8,8,0,0,0,0,16h8v32a16,16,0,0,0,16,16H48v8a16,16,0,0,0,16,16H88a16,16,0,0,0,16-16V136h48v56a16,16,0,0,0,16,16h24a16,16,0,0,0,16-16v-8h16a16,16,0,0,0,16-16V136h8a8,8,0,0,0,0-16ZM32,168V88H48v80Zm56,24H64V64H88V192Zm104,0H168V64h24V192Zm32-24H208V88h16Z"/></svg>
          <span style={{ fontFamily: 'DM Sans', fontWeight: 600, fontSize: '15px', color: '#E8E0D0' }}>Marcus Cole</span>
        </div>
        {/* Desktop: Links + CTA */}
        {!isMobile && <>
          <div style={{ display: 'flex', gap: '32px', alignItems: 'center', flex: 1, justifyContent: 'center' }}>
            {['About','Services','Process','Pricing'].map(l => (
              <button key={l} className="nav-link" onClick={() => go(l.toLowerCase())}>{l}</button>
            ))}
          </div>
          <button
            onMouseEnter={e => { e.currentTarget.style.background='#C8FF00'; e.currentTarget.style.color='#0D0D0B'; e.currentTarget.style.boxShadow='0 0 20px rgba(200,255,0,0.25)'; }}
            onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#C8FF00'; e.currentTarget.style.boxShadow='none'; }}
            onClick={() => window.location.href = 'get-started.html'}
            style={{ flexShrink: 0, padding: '8px 20px', background: 'transparent', color: '#C8FF00', border: '1.5px solid #C8FF00', borderRadius: '999px', fontSize: '14px', fontWeight: 600, transition: 'all .2s ease' }}>
            Get Started
          </button>
        </>}
        {/* Mobile: Hamburger */}
        {isMobile && (
          <button onClick={() => setMenuOpen(o => !o)} style={{ marginLeft: 'auto', background: 'none', border: 'none', padding: '4px', display: 'flex', flexDirection: 'column', gap: '5px', cursor: 'pointer' }}>
            {menuOpen
              ? <svg width="22" height="22" viewBox="0 0 256 256" fill="#E8E0D0"><path d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z"/></svg>
              : <>
                  <span style={{ display: 'block', width: '22px', height: '1.5px', background: '#E8E0D0', borderRadius: '2px' }} />
                  <span style={{ display: 'block', width: '22px', height: '1.5px', background: '#E8E0D0', borderRadius: '2px' }} />
                  <span style={{ display: 'block', width: '14px', height: '1.5px', background: '#E8E0D0', borderRadius: '2px' }} />
                </>
            }
          </button>
        )}
      </nav>
      {/* Mobile full-screen menu */}
      {isMobile && (
        <div style={{
          position: 'fixed', inset: 0, zIndex: 999,
          background: 'rgba(13,13,11,0.97)',
          backdropFilter: 'blur(16px)',
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '8px',
          opacity: menuOpen ? 1 : 0,
          pointerEvents: menuOpen ? 'all' : 'none',
          transition: 'opacity 0.25s ease',
        }}>
          {['About','Services','Process','Pricing'].map(l => (
            <button key={l} onClick={() => go(l.toLowerCase())} style={{ background: 'none', border: 'none', fontFamily: 'DM Sans', fontSize: '32px', fontWeight: 600, color: '#E8E0D0', padding: '12px 0', letterSpacing: '-0.02em', cursor: 'pointer', transition: 'color 0.2s' }}
              onMouseEnter={e => e.currentTarget.style.color = '#C8FF00'}
              onMouseLeave={e => e.currentTarget.style.color = '#E8E0D0'}>
              {l}
            </button>
          ))}
          <button onClick={() => { setMenuOpen(false); window.location.href = 'get-started.html'; }}
            style={{ marginTop: '24px', padding: '14px 40px', background: '#C8FF00', color: '#0D0D0B', border: 'none', borderRadius: '999px', fontSize: '15px', fontWeight: 700, cursor: 'pointer' }}>
            Get Started
          </button>
        </div>
      )}
    </>
  );
};

/* ════════════════════════════════════════════════════════════
   2. HERO
   Curtis-style: left-aligned content, image reveals right.
   Mixed-weight DM Sans headline. Glass stat cards. Pill CTA.
   ════════════════════════════════════════════════════════════ */
const Hero = () => {
  const [vis, setVis] = useState(false);
  const isMobile = useMobile();
  const bgRef = useRef(null);
  const heroRef = useRef(null);
  const clients = useCounter(500, 1600, vis);
  const sat = useCounter(99, 1400, vis);

  useEffect(() => {const t = setTimeout(() => setVis(true), 300);return () => clearTimeout(t);}, []);

  useEffect(() => {
    let ticking = false;
    const fn = () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          if (bgRef.current && heroRef.current) {
            const rect = heroRef.current.getBoundingClientRect();
            // progress: 0 when hero at top of screen, 1 when fully scrolled out
            // Image moves DOWN (positive Y) within the section as you scroll —
            // section moves up at 100% speed, image moves up at ~75% speed = parallax lag
            const progress = Math.max(0, Math.min(1, -rect.top / window.innerHeight));
            const offset = progress * window.innerHeight * 0.15;
            bgRef.current.style.transform = `translateY(${offset}px)`;
          }
          ticking = false;
        });
        ticking = true;
      }
    };
    fn(); // set initial position
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);

  const fd = (d) => ({
    opacity: vis ? 1 : 0,
    transform: vis ? 'none' : 'translateY(35px)',
    transition: `opacity .8s cubic-bezier(0.25, 0.46, 0.45, 0.94) ${d}ms, transform .8s cubic-bezier(0.25, 0.46, 0.45, 0.94) ${d}ms`
  });

  return (
    <section ref={heroRef} id="hero" style={{ position: 'relative', height: '100vh', minHeight: '640px', overflow: 'hidden' }}>

      {/* Background — video wrapper receives filter + parallax transform */}
      <div style={{ position: 'absolute', inset: 0, overflow: 'hidden' }}>
        <div ref={bgRef} style={{ position: 'absolute', top: '-15%', left: 0, width: '100%', height: '130%', filter: 'brightness(0.58) contrast(1.08)', willChange: 'transform' }}>
          <video autoPlay muted loop playsInline style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: '65% 30%', display: 'block' }}>
            <source src="assets/mixkit-52099-video-52099-full-hd.mp4" type="video/mp4" />
          </video>
        </div>
        {/* Directional gradient: dark left → transparent right */}
        <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(105deg, rgba(13,13,11,0.97) 0%, rgba(13,13,11,0.9) 28%, rgba(13,13,11,0.55) 55%, rgba(13,13,11,0.12) 80%, transparent 100%)' }} />
        {/* Bottom wash for stat cards */}
        <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(13,13,11,0.82) 0%, transparent 38%)' }} />
      </div>

      {/* Left-column content — full height flex */}
      <div style={{ position: 'relative', zIndex: 2, height: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'space-between', padding: isMobile ? '88px 24px 48px' : '96px 56px 56px', maxWidth: isMobile ? '100%' : '700px' }}>

        {/* Label */}
        <div style={fd(0)}>
          <span style={{ fontSize: '13px', fontWeight: 400, color: '#888880', letterSpacing: '0.01em' }}>Personal Coach</span>
        </div>

        {/* Headline + sub + CTA */}
        <div>
          {/* Mixed-weight headline: light intro / bold accent / light outro */}
          <h1 style={{ fontFamily: 'DM Sans', lineHeight: 1.0, letterSpacing: '-0.03em', marginBottom: '22px' }}>
            <div style={{ ...fd(60), fontSize: 'clamp(36px, 5vw, 72px)', lineHeight: 1.0, whiteSpace: 'nowrap' }}>
              <span style={{ fontWeight: 400, color: 'rgba(232,224,208,0.82)', whiteSpace: 'nowrap' }}>Meet the </span><span style={{ fontWeight: 800, color: '#C8FF00', whiteSpace: 'nowrap' }}>Stronger</span>
            </div>
            <div style={{ ...fd(160), fontSize: 'clamp(36px, 5vw, 72px)', fontWeight: 400, color: 'rgba(232,224,208,0.82)', lineHeight: 1.0, whiteSpace: 'nowrap' }}>version of you.</div>
          </h1>

          <div style={{ ...fd(310), maxWidth: '440px', marginBottom: '36px' }}>
            <p style={{ fontSize: '16px', fontWeight: 300, color: '#888880', lineHeight: 1.7 }}>
              Expert coaching built on proven methods — real strength, lasting progress, no filler.
            </p>
          </div>

          {/* Pill CTA with arrow circle — Curtis style */}
          <div style={fd(420)}>
            <button
              onMouseEnter={(e) => {e.currentTarget.style.transform = 'scale(1.03)';e.currentTarget.style.boxShadow = '0 0 36px rgba(200,255,0,0.32)';}}
              onMouseLeave={(e) => {e.currentTarget.style.transform = 'scale(1)';e.currentTarget.style.boxShadow = 'none';}}
              onClick={() => window.location.href = 'get-started.html'}
              style={{ display: 'inline-flex', alignItems: 'center', gap: '14px', padding: '12px 14px 12px 28px', background: '#C8FF00', color: '#0D0D0B', fontSize: '14px', fontWeight: 600, border: 'none', borderRadius: '999px', cursor: 'pointer', transition: 'transform .22s ease, box-shadow .22s ease' }}>
              Get Started
              <span style={{ width: '34px', height: '34px', borderRadius: '50%', background: '#0D0D0B', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '15px', color: '#C8FF00', flexShrink: 0 }}>↗</span>
            </button>
          </div>
        </div>

        {/* Glass stat cards — Curtis style */}
        <div style={{ ...fd(540), display: 'flex', gap: '12px' }}>
          {[{ val: `${clients}+`, label: 'Clients Transformed' }, { val: `${sat}%`, label: 'Satisfaction Rate' }].map(({ val, label }) =>
          <div key={label} style={{ padding: isMobile ? '16px 20px' : '20px 28px', background: 'rgba(255,255,255,0.07)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '16px', flex: isMobile ? 1 : 'none', minWidth: isMobile ? 0 : '150px' }}>
              <div style={{ fontFamily: 'DM Sans', fontWeight: 700, fontSize: isMobile ? '28px' : '38px', lineHeight: 1, letterSpacing: '-0.02em', color: '#E8E0D0' }}>{val}</div>
              <div style={{ fontSize: '12px', fontWeight: 400, color: '#888880', marginTop: '5px' }}>{label}</div>
            </div>
          )}
        </div>
      </div>
    </section>);

};

/* ════════════════════════════════════════════════════════════
   3. ABOUT
   45/55. Photo bleeds. DM Sans 800 heading. Marquee.
   ════════════════════════════════════════════════════════════ */
const creds = ['NASM Certified · ', 'ACE Personal Trainer · ', 'Strength & Conditioning Specialist · ', 'Sports Nutrition · ', 'FMS Level 2 · ', 'NASM Certified · ', 'ACE Personal Trainer · ', 'Strength & Conditioning Specialist · ', 'Sports Nutrition · ', 'FMS Level 2 · '];

const About = () => {
  const sectionRef = useRef(null);
  const [gridRef, vis] = useInView(0.2, '0px 0px -5% 0px');
  const [gridVis, setGridVis] = React.useState(false);
  const [br, setBr] = React.useState(28);
  const isMobile = useMobile();
  React.useEffect(() => {
    if (!vis) return;
    setGridVis(true);
    return () => {};
  }, [vis]);
  React.useEffect(() => {
    let ticking = false;
    const onScroll = () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        const el = sectionRef.current;
        if (el) {
          const top = el.getBoundingClientRect().top;
          const start = window.innerHeight * 0.65;
          const t = 1 - Math.max(0, Math.min(1, top / start));
          setBr(Math.round(28 * (1 - t)));
        }
        ticking = false;
      });
    };

/* ════════════════════════════════════════════════════════════
   INTRO OVERLAY
   Full-screen video dissolve on page load.
   ════════════════════════════════════════════════════════════ */
const Intro = () => {
  const [phase, setPhase] = React.useState('show');
  const [delta, setDelta] = React.useState(0);
  const THRESHOLD = 280;

  const dissolve = React.useCallback(() => {
    setPhase(p => {
      if (p !== 'show') return p;
      setTimeout(() => {
        document.body.style.overflow = '';
        setPhase('done');
      }, 1200);
      return 'dissolve';
    });
  }, []);

  React.useEffect(() => {
    document.body.style.overflow = 'hidden';
    const onWheel = (e) => {
      setDelta(d => {
        const next = d + Math.abs(e.deltaY);
        if (next >= THRESHOLD) dissolve();
        return next;
      });
    };
    const onTouch = () => dissolve();
    window.addEventListener('wheel', onWheel, { passive: true });
    window.addEventListener('touchmove', onTouch, { passive: true });
    return () => {
      document.body.style.overflow = '';
      window.removeEventListener('wheel', onWheel);
      window.removeEventListener('touchmove', onTouch);
    };
  }, [dissolve]);

  if (phase === 'done') return null;

  const push         = Math.min(delta / THRESHOLD, 1);
  const pushScale    = phase === 'dissolve' ? 0.78 : 1 - push * 0.13;
  const pushBright   = phase === 'dissolve' ? 0.5  : 1 - push * 0.35;

  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 9998,
      opacity: phase === 'dissolve' ? 0 : 1,
      transform: `scale(${pushScale})`,
      filter: `brightness(${pushBright})`,
      transition: phase === 'dissolve'
        ? 'opacity 1.0s ease, transform 1.0s ease, filter 1.0s ease'
        : 'transform 0.12s ease-out, filter 0.12s ease-out',
      pointerEvents: 'all',
      background: '#0D0D0B',
    }}>
      {/* Video */}
      <video autoPlay muted playsInline loop style={{
        position: 'absolute', inset: 0, width: '100%', height: '100%',
        objectFit: 'cover', objectPosition: '65% 30%', display: 'block',
      }}>
        <source src="assets/mixkit-52099-video-52099-full-hd.mp4" type="video/mp4" />
      </video>

      {/* Dark veil */}
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.65) 100%)' }} />

      {/* Brand content */}
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        gap: '0px',
        opacity: delta > 0 ? 0 : 1,
        transition: delta > 0 ? 'opacity 0.3s ease' : 'none',
        pointerEvents: 'none',
      }}>
        <div style={{
          fontSize: '11px', fontWeight: 500, letterSpacing: '0.3em', textTransform: 'uppercase',
          color: 'rgba(232,224,208,0.55)', marginBottom: '20px',
          animation: 'introFadeUp 0.9s cubic-bezier(0.25,0.46,0.45,0.94) 0.3s both',
        }}>
          Personal Trainer &nbsp;·&nbsp; San Francisco
        </div>
        <h1 style={{
          fontFamily: 'Bebas Neue', fontSize: 'clamp(80px, 12vw, 152px)', lineHeight: 0.88,
          letterSpacing: '0.04em', color: '#E8E0D0', margin: 0,
          animation: 'introFadeUp 0.9s cubic-bezier(0.25,0.46,0.45,0.94) 0.5s both',
        }}>
          Marcus Cole
        </h1>
        <div style={{

      </div>

      {/* Scroll indicator */}
      <div style={{
